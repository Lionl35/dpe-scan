<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DPE Scan</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <header class="bg-slate-900 text-white py-6 shadow-md">
    <div class="max-w-6xl mx-auto px-4 flex justify-between items-center">
      <h1 class="text-2xl font-black tracking-wider text-emerald-400">DPE SCAN <span class="text-xs text-white bg-emerald-600 px-2 py-0.5 rounded ml-2">LIVE PROXY</span></h1>
      <span id="host-indicator" class="text-sm text-gray-400 font-mono">Connexion active</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8">
    <div class="bg-white rounded-xl p-6 shadow-sm border border-gray-100 mb-8">
      <form id="search-form" class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
        <div>
          <label for="zipcode" class="block text-sm font-semibold text-gray-700 mb-1">Code Postal</label>
          <input type="text" id="zipcode" required placeholder="Ex: 35000" maxlength="5"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition">
        </div>

        <div>
          <label for="start-date" class="block text-sm font-semibold text-gray-700 mb-1">DPE depuis le...</label>
          <input type="date" id="start-date" required
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition">
        </div>

        <div>
          <label for="text-filter" class="block text-sm font-semibold text-gray-700 mb-1">Filtrer par rue (Optionnel)</label>
          <input type="text" id="text-filter" placeholder="Ex: Rue de la Paix"
                 class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition">
        </div>

        <div>
          <button type="submit" 
                  class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2.5 px-4 rounded-lg shadow transition duration-150 flex justify-center items-center gap-2">
            <span>Scanner la zone</span>
          </button>
        </div>
      </form>
    </div>

    <div class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
      <div class="p-4 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
        <h2 class="font-bold text-gray-800">Résultats du scan</h2>
        <span id="results-count" class="text-sm bg-gray-200 text-gray-700 px-3 py-1 rounded-full font-medium">0 trouvé(s)</span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="bg-gray-100 text-gray-600 text-xs uppercase font-semibold">
              <th class="p-4">Numéro DPE</th>
              <th class="p-4">Date Réalisation</th>
              <th class="p-4">Adresse</th>
              <th class="p-4 text-center">DPE / GES</th>
            </tr>
          </thead>
          <tbody id="results-body" class="divide-y divide-gray-100">
            <tr>
              <td colspan="4" class="p-8 text-center text-gray-400 italic">Saisissez vos critères et lancez le scan.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById('search-form');
    const zipcode = document.getElementById('zipcode');
    const startDate = document.getElementById('start-date');
    const textFilter = document.getElementById('text-filter');
    const resultsBody = document.getElementById('results-body');
    const resultsCount = document.getElementById('results-count');
    const hostIndicator = document.getElementById('host-indicator');

    // Afficher l'adresse de votre serveur Render
    hostIndicator.textContent = window.location.origin;

    // Fixe par défaut la date à J-14
    const defaultDate = new Date();
    defaultDate.setDate(defaultDate.getDate() - 14);
    startDate.value = defaultDate.toISOString().split('T')[0];

    let currentDpeList = [];

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      resultsBody.innerHTML = `
        <tr>
          <td colspan="4" class="p-8 text-center text-gray-500 font-medium animate-pulse">
            ⏳ Scan en cours via le serveur sécurisé...
          </td>
        </tr>
      `;

      try {
        // L'appel se fait vers votre serveur proxy Express
        const response = await fetch('/api/search', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            codePostal: zipcode.value.trim(),
            dateDepart: startDate.value
          })
        });

        if (!response.ok) {
          const errorData = await response.json().catch(() => ({}));
          throw new Error(errorData.error || `Erreur serveur (Code ${response.status})`);
        }

        const data = await response.json();
        currentDpeList = data.resultats || data || [];
        renderResults();

      } catch (error) {
        resultsBody.innerHTML = `
          <tr>
            <td colspan="4" class="p-8 text-center text-red-500 font-semibold">
              ❌ Erreur : ${error.message}
            </td>
          </tr>
        `;
      }
    });

    textFilter.addEventListener('input', renderResults);

    function renderResults() {
      const filterText = textFilter.value.toLowerCase().trim();
      const filteredList = currentDpeList.filter(dpe => {
        const adresse = (dpe.adresse_brute || dpe.adresse || '').toLowerCase();
        return adresse.includes(filterText);
      });

      resultsCount.textContent = `${filteredList.length} trouvé(s)`;

      if (filteredList.length === 0) {
        resultsBody.innerHTML = `
          <tr>
            <td colspan="4" class="p-8 text-center text-gray-400 italic">Aucun diagnostic trouvé pour ces critères.</td>
          </tr>
        `;
        return;
      }

      resultsBody.innerHTML = filteredList.map(dpe => {
        const codeDpe = dpe.numero_dpe || dpe.identifiant_dpe;
        const adresse = dpe.adresse_brute || dpe.adresse || 'Adresse non communiquée';
        const dateEtablissement = dpe.date_etablissement || dpe.date_realisation_dpe || 'Inconnue';
        
        const noteDpe = dpe.classe_consommation_energie || dpe.classe_dpe || '-';
        const noteGes = dpe.classe_estimation_emissions_ges || dpe.classe_ges || '-';

        const badgeColor = (note) => {
          const colors = {
            'A': 'bg-green-100 text-green-800 border-green-300',
            'B': 'bg-lime-100 text-lime-800 border-lime-300',
            'C': 'bg-yellow-100 text-yellow-800 border-yellow-300',
            'D': 'bg-amber-100 text-amber-800 border-amber-300',
            'E': 'bg-orange-100 text-orange-800 border-orange-300',
            'F': 'bg-red-100 text-red-800 border-red-300',
            'G': 'bg-red-200 text-red-900 border-red-400'
          };
          return colors[note] || 'bg-gray-100 text-gray-800 border-gray-300';
        };

        const ademeLink = `https://observatoire-dpe-audit.ademe.fr/fiche/${codeDpe}`;

        return `
          <tr class="hover:bg-gray-50 transition">
            <td class="p-4 font-mono text-sm text-emerald-600 font-bold">
              <a href="${ademeLink}" target="_blank" class="hover:underline flex items-center gap-1.5">
                ${codeDpe}
                <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"></path>
                </svg>
              </a>
            </td>
            <td class="p-4 text-sm text-gray-600">${dateEtablissement}</td>
            <td class="p-4 text-sm text-gray-800 font-medium">${adresse}</td>
            <td class="p-4 text-center">
              <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-bold border ${badgeColor(noteDpe)}">DPE : ${noteDpe}</span>
              <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-bold border ${badgeColor(noteGes)} ml-1">GES : ${noteGes}</span>
            </td>
          </tr>
        `;
      }).join('');
    }
  </script>
</body>
</html>
